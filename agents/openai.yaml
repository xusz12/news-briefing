interface:
  display_name: "news-briefing"
  short_description: "Summarize the newest freshNews.md into a concise Chinese briefing with current-focus, market, and tech sections"
  default_prompt: "Read the newest freshNews or dailyFreshNews file in NewsOfCodex (or a user-provided directory), parse its sections and items, and produce a not-too-long Chinese briefing using 当前关注 / 市场 / 科技 / 其余简报. Use --mode fresh (default) for current-period briefings, or --mode daily for same-day cumulative summaries. Supports both new (dailyFreshNews_YYYY-MM-DD.md) and legacy (YYYY-MM-DD_dailyFreshNews.md) naming. Use --file to bypass the finder and read a specific file directly. Keep sensitivity folded into 当前关注, use briefing tone instead of essay tone, omit links and why-important labels by default, and make sure AI, Apple, and 郭明錤 items are included when they have substantive developments. Do not write filler about missing updates, and do not use source labels like Reuters World or Sina China News as briefing content."
