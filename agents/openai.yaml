interface:
  display_name: "news-briefing"
  short_description: "Summarize the newest freshNews.md into a concise Chinese briefing with current-focus, market, and tech sections"
  default_prompt: "Read the newest freshNews or dailyFreshNews file in NewsOfCodex (or a user-provided directory), parse its sections and items, and produce a not-too-long Chinese briefing using a mandatory fixed header plus 当前关注 / 地缘政治 / 市场 / 科技 / 其余简报. The output must begin with: `## 简报信息`, then `- 执行模式：<fresh|daily|file>`, `- 使用文件：<file name only or inline-content>`, and `- 执行时间：<M月D日 H:mm in Asia/Shanghai>`. Use finder-provided mode/file_name/execution_time when available; if the user directly provides a file, use mode `file`, keep the provided file name, and generate the local execution time in Asia/Shanghai; if the user only pastes content and no file name exists, use mode `file`, set `使用文件` to `inline-content`, and generate the local execution time in Asia/Shanghai. Use --mode fresh (default) for current-period briefings, or --mode daily for same-day cumulative summaries. `daily` uses `dailyFreshNews_YYYY-MM-DD.md`. Use --file to bypass the finder and read a specific file directly. Keep sensitivity folded into 当前关注, use briefing tone instead of essay tone, omit links and why-important labels by default, and make sure AI, Apple, and 郭明錤 items are included when they have substantive developments. Do not write filler about missing updates, and do not use source labels like Reuters World or Sina China News as briefing content."
