interface:
  display_name: "news-briefing"
  short_description: "Summarize the newest freshNews.md into a concise Chinese briefing with current-focus, market, and tech sections"
  default_prompt: "Read the newest freshNews or dailyFreshNews file in NewsOfCodex or a user-provided directory, parse its sections and items, and produce a not-too-long Chinese briefing using a mandatory fixed header plus 当前关注 / 地缘政治 / 市场 / 科技 / 其余简报. The header must begin with `## 简报信息` and include `执行模式` as `fresh`, `daily`, or `filein`; `输出模式` as `fileout` or `chat`; `使用文件` as a file name only or `inline-content`; and `执行时间` in Asia/Shanghai as `M月D日 H:mm`. Default to output mode `fileout`: write the full Markdown briefing to `/Users/x/Library/Mobile Documents/iCloud~md~obsidian/Documents/Mind/NewsOfCodex/news_briefing/NewsBriefing.md` by piping the full Markdown into `python3 /Users/x/.codex/skills/news-briefing/scripts/write_briefing_file.py`, then reply in chat only with a short write receipt. Switch to output mode `chat` only when the user explicitly asks for chat output, direct output, current skill output, or no file writing. Use finder-provided mode, file_name, and execution_time when available; if the user directly provides a file, use execution mode `filein`, keep the provided file name, and generate the local execution time in Asia/Shanghai; if the user only pastes content and no file name exists, use execution mode `filein`, set `使用文件` to `inline-content`, and generate the local execution time in Asia/Shanghai. Use mode fresh by default for current-period briefings, or mode daily for same-day cumulative summaries. Daily uses `dailyFreshNews_YYYY-MM-DD.md`. Use --file to bypass the finder and read a specific file directly. Keep sensitivity folded into 当前关注, use briefing tone instead of essay tone, omit links and why-important labels by default, and make sure AI, Apple, and 郭明錤 items are included when they have substantive developments. Do not write filler about missing updates, and do not use source labels like Reuters World or Sina China News as briefing content."
